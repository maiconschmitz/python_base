name: Construir e Publicar Imagem Docker

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'versions.txt'
      - '**/Dockerfile'
      - '.github/workflows/docker-build-push.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'versions.txt'
      - '**/Dockerfile'
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: 'Publicar no Docker Hub'
        type: boolean
        default: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: python-base

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.matrix.outputs.versions }}
      latest_version: ${{ steps.matrix.outputs.latest_version }}
    steps:
    - name: Baixa código do repositório
      uses: actions/checkout@v4

    - name: Prepara matriz de versões
      id: matrix
      run: |
        versions_json=$(python3 - <<'PY'
        from pathlib import Path
        import json

        versions = [
            line.strip()
            for line in Path("versions.txt").read_text().splitlines()
            if line.strip() and not line.startswith("#")
        ]
        print(json.dumps(versions))
        PY
        )
        echo "versions=$versions_json" >> "$GITHUB_OUTPUT"
        echo "latest_version=$(tail -n 1 versions.txt)" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.prepare.outputs.versions) }}

    steps:
    - name: Baixa código do repositório
      uses: actions/checkout@v4

    - name: Configura Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Efetua login no Docker Hub
      if: github.event_name != 'pull_request' && (github.event_name == 'workflow_dispatch' && inputs.push_to_registry == 'true' || github.event_name != 'workflow_dispatch')
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extrai metadados da imagem
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch,suffix=-${{ matrix.python-version }}
          type=ref,event=pr,suffix=-${{ matrix.python-version }}
          type=semver,pattern={{version}},suffix=-${{ matrix.python-version }}
          type=raw,value=${{ matrix.python-version }}
          type=raw,value=latest,enable=${{ matrix.python-version == needs.prepare.outputs.latest_version }}

    - name: Constrói e publica imagem Docker
      uses: docker/build-push-action@v5
      with:
        context: ./${{ matrix.python-version }}
        file: ./${{ matrix.python-version }}/Dockerfile
        push: ${{ github.event_name != 'pull_request' && (github.event_name == 'workflow_dispatch' && inputs.push_to_registry == 'true' || github.event_name != 'workflow_dispatch') }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=${{ matrix.python-version }}
        cache-to: type=gha,mode=max,scope=${{ matrix.python-version }}
        platforms: linux/amd64,linux/arm64

    - name: Verifica construção da imagem
      if: github.event_name == 'pull_request'
      run: |
        echo "✅ Imagem ${{ matrix.python-version }} construída com sucesso!"
        echo "🏷️ Tags: ${{ steps.meta.outputs.tags }}"
        echo "📋 Labels: ${{ steps.meta.outputs.labels }}"

    - name: Notifica sucesso da publicação
      if: success() && github.event_name != 'pull_request'
      run: |
        echo "✅ Imagem Docker ${{ matrix.python-version }} publicada com sucesso!"
        echo "📦 Imagem: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
        echo "🏷️ Tags: ${{ steps.meta.outputs.tags }}"
        echo "🚀 A imagem está disponível no Docker Hub!"

    - name: Notifica falha na construção
      if: failure()
      run: |
        echo "❌ Falha ao construir ou publicar a imagem Docker ${{ matrix.python-version }}"
        echo "🔍 Verifique os logs acima para mais detalhes"
        exit 1
